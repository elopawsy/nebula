version: '3.8'

services:

  # ── VM1 : INFRA / MONITORING ────────────────────────

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu1-mickisze

  portainer-agent:
    image: portainer/agent:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - nebula-net
    deploy:
      mode: global
      placement:
        constraints:
          - node.hostname != ubuntu1-mickisze

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu1-mickisze

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=nebula_grafana
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu1-mickisze

  # ── VM3 : DATA / CACHE ──────────────────────────────

  postgres-primary:
    image: postgres:16
    environment:
      POSTGRES_USER: nebula
      POSTGRES_PASSWORD: nebula_pass
      POSTGRES_DB: nebula
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu1-mickisze

  postgres-replica:
    image: postgres:16
    environment:
      POSTGRES_USER: nebula
      POSTGRES_PASSWORD: nebula_pass
      POSTGRES_DB: nebula
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu3-mickisze

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu3-mickisze

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu3-mickisze

  # ── VM3 : TRAEFIK ───────────────────────────────────

  traefik:
    image: traefik:v3.0
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.swarmMode=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --metrics.prometheus=true
      - --metrics.prometheus.buckets=0.1,0.3,1.2,5.0
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu3-mickisze

  # ── VM2 : SERVICES MÉTIER ───────────────────────────

  auth-service:
    image: node:20-alpine
    command: sh -c "echo 'auth-service placeholder' && sleep infinity"
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu2-mickisze

  posts-service:
    image: node:20-alpine
    command: sh -c "echo 'posts-service placeholder' && sleep infinity"
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu2-mickisze

  timeline-service:
    image: node:20-alpine
    command: sh -c "echo 'timeline-service placeholder' && sleep infinity"
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu2-mickisze

  follow-service:
    image: node:20-alpine
    command: sh -c "echo 'follow-service placeholder' && sleep infinity"
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu2-mickisze

  notif-service:
    image: node:20-alpine
    command: sh -c "echo 'notif-service placeholder' && sleep infinity"
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu2-mickisze

  search-service:
    image: node:20-alpine
    command: sh -c "echo 'search-service placeholder' && sleep infinity"
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu2-mickisze

  moderation-service:
    image: node:20-alpine
    command: sh -c "echo 'moderation-service placeholder' && sleep infinity"
    networks:
      - nebula-net
    deploy:
      placement:
        constraints:
          - node.hostname == ubuntu2-mickisze

configs:
  prometheus_config:
    external: true

volumes:
  postgres_primary_data:
  postgres_replica_data:
  redis_data:
  es_data:
  portainer_data:
  prometheus_data:
  grafana_data:

networks:
  nebula-net:
    external: true
